<form
  name="kontakt"
  method="POST"
  action="/tak"
  data-netlify="true"
  data-netlify-honeypot="bot-field"
  data-netlify-ajax
  class="space-y-5">

  <input type="hidden" name="form-name" value="kontakt" />
  <p class="hidden"><label>Lad dette felt stå tomt: <input name="bot-field" /></label></p>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
    <div>
      <label for="name" class="block text-sm font-medium text-text-dark mb-1.5">Navn *</label>
      <input id="name" name="name" type="text" required
        placeholder="Dit fulde navn"
        class="w-full px-4 py-3 rounded-lg border border-gray-200 text-text-dark placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-sm" />
    </div>
    <div>
      <label for="email" class="block text-sm font-medium text-text-dark mb-1.5">Email *</label>
      <input id="email" name="email" type="email" required
        placeholder="din@email.dk"
        class="w-full px-4 py-3 rounded-lg border border-gray-200 text-text-dark placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-sm" />
    </div>
  </div>

  <div>
    <label for="phone" class="block text-sm font-medium text-text-dark mb-1.5">Telefon</label>
    <input id="phone" name="phone" type="tel"
      placeholder="+45 12 34 56 78"
      class="w-full px-4 py-3 rounded-lg border border-gray-200 text-text-dark placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-sm" />
  </div>

  <div>
    <label for="subject" class="block text-sm font-medium text-text-dark mb-1.5">Emne</label>
    <select id="subject" name="subject"
      class="w-full px-4 py-3 rounded-lg border border-gray-200 text-text-dark focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-sm bg-white">
      <option value="">Vælg emne...</option>
      <option value="privat-terapi">Privat terapi</option>
      <option value="naturterapi">Naturterapi</option>
      <option value="workshop">Workshop til virksomhed</option>
      <option value="foredrag">Foredrag</option>
      <option value="kommune">Kommunalt samarbejde</option>
      <option value="andet">Andet</option>
    </select>
  </div>

  <div>
    <label for="message" class="block text-sm font-medium text-text-dark mb-1.5">Besked *</label>
    <textarea id="message" name="message" required rows="5"
      placeholder="Fortæl kort hvad du ønsker hjælp til..."
      class="w-full px-4 py-3 rounded-lg border border-gray-200 text-text-dark placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-sm resize-none"></textarea>
  </div>

  <div data-form-status class="hidden p-4 rounded-lg text-sm" role="alert"></div>

  <button type="submit" data-form-submit
    class="w-full btn-primary py-3.5 font-semibold transition-all">
    Send besked
  </button>

  <p class="text-xs text-text-muted text-center">
    Dine oplysninger behandles fortroligt. Jeg svarer inden for 24 timer på hverdage.
  </p>
</form>
