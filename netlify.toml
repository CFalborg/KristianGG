[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Trailing slash redirects (301 = preserves SEO equity)
[[redirects]]
  from = "/hypnosen/"
  to = "/hypnosen"
  status = 301

[[redirects]]
